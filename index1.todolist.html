<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: rgb(235, 220, 255);
        }

        .text {
            color: rgb(137, 68, 128);
            font-size: 50px;
            position: absolute;
            top: 0;
            left: 380px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;


        }

        #search {
            position: absolute;
            left: 240px;
            top: 60px;
            width: 450px;
            height: 30px;
            background-color: rgb(194, 204, 249);
            border: 1px solid white;
            border-radius: 20px;
            padding-left: 5px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }

        button {
            background-color: rgb(194, 204, 249);
            border: 1px solid white;
            border-radius: 20px;
            color: white;
            width: 68px;
            height: 33px;
            color: rgba(71, 85, 71, 0.753);
            font-size: 16px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
            position: absolute;
            left: 700px;
            top: 60px;
            cursor: pointer;

        }

        .ok {
            position: absolute;
            top: 150px;
            right: 280px;
            z-index: 99;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(136, 48, 87);

        }

        .notok {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            position: absolute;
            top: 150px;
            left: 280px;
            z-index: 99;
            color: rgb(136, 48, 87);
            gap: 5px;

        }



        main {
            width: 600px;
            height: 300px;
            background-color: rgb(231, 198, 217);
            margin: 100px auto;
            border-radius: 20px;
            position: relative;

            .addtask {
                background-color: rgb(236, 212, 230);
                border: 1px solid white;
                border-radius: 20px;
                width: 400px;
                height: 30px;
                position: absolute;
                top: 10px;
                right: 70px;
                cursor: pointer;
                font-size: 15px;
                text-align: left;
                padding-left: 5px;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                color: rgba(71, 85, 71, 0.862);
            }

            button {
                background-color: rgb(236, 212, 230);
                border: 1px solid white;
                border-radius: 20px;
                position: absolute;
                top: 10px;
                left: 40px;
                width: 68px;
                height: 33px;
                color: rgba(71, 85, 71, 0.862);
                font-size: 16px;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                text-align: center;
            }

            #finish {
                position: absolute;
                top: 62px;
                right: 20px;

                li {
                    text-decoration: line-through;
                    width: 260px;
                    background-color: rgb(174, 120, 154);
                    padding: 10px;
                    color: white;
                    list-style-type: none;
                    border-radius: 10px;
                    transition: 1s;
                    font-size: 15px;
                    height: 43px;
                    margin-top: 7px;

                    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

                }
            }

            >div {
                width: 50%;
                height: 100%;
                padding-left: 20px;
                padding-top: 60px;

                >h2 {
                    padding-right: 50px;

                }

                &:first-of-type {
                    li {
                        width: 260px;
                        background-color: rgb(174, 120, 154);
                        padding: 10px;
                        color: white;
                        list-style-type: none;
                        margin: 10px 0;
                        border-radius: 10px;
                        transition: .5s;
                        position: relative;
                        font-size: 10px;
                        display: flex;
                        gap: 5px;
                        align-items: center;
                        height: 43px;



                        .check {
                            width: 15px;
                            height: 15px;

                            border-radius: 50px;

                            position: absolute;
                            right: -26px;
                            top: 14px;
                        }

                        >.dele {
                            >svg {
                                position: absolute;
                                right: 5px;
                                top: 10px;
                                width: 20px;
                                height: 20px;
                                color: rgb(227, 172, 201);

                            }
                        }

                        >.ed {
                            >svg {
                                position: absolute;
                                right: 25px;
                                width: 20px;
                                height: 20px;
                                color: rgb(227, 172, 201);
                                top: 10px;

                            }

                        }
                    }
                }
            }
        }

        .del {
            opacity: 0;
        }

        .hide {
            display: none;
            background-color: rgb(213, 173, 207);
            border: 1px solid white;
            border-radius: 5px;
            width: 50px;
            height: 20px;
            font-size: 12px;
            position: absolute;
            right: 45px;
            color: rgb(121, 45, 101);

        }
    </style>
</head>

<body>
    <div class="text">To Do List</div>
    <div class="ok">Tasks completed
    </div>
    <div class="notok">Uncompleted tasks</div>
    <input type="text" id="search" placeholder="search your task...">
    <button onclick="mysearch(this)">search</button>

    <main>

        <div class="task">
            <div class="row">
                <input type="text" class="addtask" placeholder="let's do it ❤">
                <button onclick="mytodo(this)">Add</button>
            </div>
            <ul id="list">

            </ul>
        </div>
        <div class="compelete">

            <ul id="finish">

            </ul>

        </div>
    </main>
</body>
<script>
    function mytodo(s) {
        let temp = s.previousElementSibling.value
        if (temp == '') {
            alert('try again')
        } else {
            let li = document.createElement('li')
            li.innerHTML = `
            
<h2>${temp}</h2>

    <span class="ed" onclick="myedit(this)"><svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
            </svg></span> 
    <span class="dele" onclick="mydel(this)"><svg   data-slot="icon" fill="none" stroke-width="1.5" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"></path>
            </svg></span> 
    <input class='check'  onclick="move(this)" type="checkbox">
    <input  type="text" class="hide" placeholder="update this task">
            
                 `
            document.getElementById('list').appendChild(li)
            s.previousElementSibling.value = null
            s.previousElementSibling.focus()


        }


    }
    function mydel(s) {
        if (confirm('sure?')) {
            s.parentElement.classList.add('del')
            setTimeout(() => {
                s.parentElement.remove()

            }, 1000);
        }
    }
    let flag = 1


    function myedit(s) {

        if (flag % 2) {

            s.innerHTML = `<svg  data-slot="icon" fill="none" stroke-width="1.5" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
             <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z"></path>
           </svg>`
            s.parentElement.children[4].style.display = 'flex'
            s.parentElement.children[4].value = s.previousElementSibling.innerText
        } else {
            s.innerHTML = `<svg  xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
            </svg>`
            s.parentElement.children[4].style.display = 'none'
            s.previousElementSibling.innerText = s.parentElement.children[4].value

        } flag++
    }
    function move(s) {
        let cloneli = s.parentElement.innerText
        s.parentElement.remove()
        let finishli = document.createElement('li')
        finishli.innerText = cloneli
        document.getElementById('finish').appendChild(finishli)

    }
    function mysearch(s) {
        const h2 = document.querySelectorAll('main h2')
        let temp = s.previousElementSibling.value
        for (let i = 0; i < h2.length; i++) {
            console.log(h2[i].innerText);
            if (h2[i].innerText.indexOf(temp) == -1) {
                h2[i].parentElement.style.display = 'none'
            } else {
                h2[i].parentElement.style.display = 'block'

            }

        }

    }

</script>

</html>
